# Nginx must NOT set Access-Control-Allow-Origin to a single site.
# If you see sphinx-bay.vercel.app in browser errors, remove blocks like this from your site config:

# WRONG — delete these from /etc/nginx/sites-enabled/:
# add_header Access-Control-Allow-Origin "https://sphinx-bay.vercel.app" always;
# add_header Access-Control-Allow-Credentials "true" always;

# Let Node.js send CORS (*). Proxy example for api.citysphinx.com:

server {
    listen 443 ssl;
    server_name api.citysphinx.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do not add Access-Control-* headers here — Node handles CORS
    }
}
